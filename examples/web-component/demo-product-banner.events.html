<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Demo Product Banner Events</title>
  </head>
  <body>
    <main style="max-width: 720px; margin: 40px auto; font-family: sans-serif">
      <h1>Web Component events example</h1>
      <demo-product-banner
        title="推薦商品"
        locale="zh-TW"
        products='[{"id":"p1","name":"商品 A","price":1200},{"id":"p2","name":"商品 B","price":900}]'
      ></demo-product-banner>
      <pre data-testid="event-log">No events yet</pre>
    </main>
    <script src="../../dist/widgets/demo-product-banner.wc.js"></script>
    <script>
      const log = document.querySelector('[data-testid="event-log"]')
      document
        .querySelector('demo-product-banner')
        .addEventListener('demo-product:product-select', (event) => {
          log.textContent = `demo-product:product-select ${event.detail.product.id}`
        })
    </script>
  </body>
</html>
