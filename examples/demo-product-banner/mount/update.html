<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Demo Product Banner Mount API Update 範例</title>
  </head>
  <body>
    <main style="max-width: 720px; margin: 40px auto; font-family: sans-serif">
      <h1>Mount API update 範例</h1>
      <div id="demo-product-root"></div>
      <div style="display: flex; gap: 8px; margin-top: 16px">
        <button type="button" id="update">更新資料</button>
        <button type="button" id="unmount">卸載元件</button>
      </div>
    </main>
    <script src="../../../dist/widgets/latest/demo-product-banner/mount.js"></script>
    <script>
      const mounted = DemoProductBanner.mount('#demo-product-root', {
        title: '推薦商品',
        locale: 'zh-TW',
        products: [{ id: 'p1', name: '商品 A', price: 1200 }],
      })

      document.getElementById('update').addEventListener('click', () => {
        mounted.update({
          title: '推薦商品',
          locale: 'zh-TW',
          products: [{ id: 'p2', name: '更新後商品', price: 990 }],
        })
      })

      document.getElementById('unmount').addEventListener('click', () => {
        mounted.unmount()
      })
    </script>
  </body>
</html>
